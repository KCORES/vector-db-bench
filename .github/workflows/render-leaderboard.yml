name: Render Leaderboard Chart

on:
  push:
    paths:
      - "results/leaderboard.json"
      - "leaderboard/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install matplotlib numpy Pillow

      - name: Rebuild leaderboard.json
        run: python3 scripts/rebuild_leaderboard.py --leaderboard-dir ./leaderboard --output ./results/leaderboard.json

      - name: Render leaderboard.png
        run: python3 scripts/render_leaderboard.py

      - name: Render leaderboard_all.png
        run: python3 scripts/render_leaderboard.py --all

      - name: Commit updated leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/leaderboard.json assets/images/leaderboard.png assets/images/leaderboard_all.png
          git diff --cached --quiet || git commit -m "chore: update leaderboard chart [skip ci]"
          git push
